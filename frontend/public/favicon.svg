<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Multi-stop gradient for realistic leaf texture -->
    <linearGradient id="mainLeafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8cdb8" />
      <stop offset="40%" stop-color="#8ba68b" />
      <stop offset="100%" stop-color="#5b755b" />
    </linearGradient>
    
    <!-- Rich Seed Gradient -->
    <radialGradient id="seedTexture" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#725a3a" />
      <stop offset="60%" stop-color="#2d3a2d" />
      <stop offset="100%" stop-color="#1a241a" />
    </radialGradient>

    <!-- Seed Outline Glow -->
    <linearGradient id="seedEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4b97a" />
      <stop offset="100%" stop-color="#c5a059" />
    </linearGradient>
  </defs>

  <!-- The Organic Avocado/N-Leaf Motif -->
  <!-- Left Avocado Curve -->
  <path 
    d="M40 22C24 22 14 38 14 58C14 78 28 88 48 88C62 88 72 80 75 68" 
    stroke="url(#mainLeafGradient)" 
    stroke-width="11" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
  
  <!-- N-Diagonal Connection -->
  <path 
    d="M40 22C46 32 58 55 78 90" 
    stroke="url(#mainLeafGradient)" 
    stroke-width="13" 
    stroke-linecap="round" 
  />
  
  <!-- Stylized Elegant Leaf Flick -->
  <path 
    d="M78 90C78 90 78 58 92 32C95 22 78 38 72 48" 
    fill="url(#mainLeafGradient)"
  />
  <path 
    d="M78 90C80 65 88 45 92 32" 
    stroke="url(#seedEdge)" 
    stroke-width="1.5" 
    opacity="0.3"
  />

  <!-- The Seed (The high-fidelity core) -->
  <circle cx="36" cy="62" r="18" fill="url(#seedTexture)" />
  <circle cx="36" cy="62" r="16.5" stroke="url(#seedEdge)" stroke-width="2.5" opacity="0.9" />
  
  <!-- High-Fidelity Reflective Highlight -->
  <path d="M43 55C43 55 46 58 46 62" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.4" />
  <circle cx="30" cy="58" r="1" fill="white" opacity="0.2" />
</svg>