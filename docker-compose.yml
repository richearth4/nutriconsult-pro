version: '3.8'

services:
  web:
    build: .
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - DATABASE_URL=postgres://user:password@db:5432/nutriconsult
      - NODE_ENV=production
      - JWT_SECRET=dev_secret_change_in_prod_123456789
      # Add other env vars here as needed from .env
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=nutriconsult
    ports:
      - "5432:5432"

volumes:
  postgres_data:
